name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read
  pull-requests: read

jobs:
  check:
    name: Build, Test, Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check test surface (no quarantined/ignored tests)
        run: cargo xtask check-test-surface

      - name: Build
        run: cargo build --workspace --all-features

      - name: Test (default features)
        run: cargo test --workspace

      - name: Test (no-default-features minimal)
        run: cargo test -p sassi --no-default-features

      - name: Test (no-default + serde)
        run: cargo test -p sassi --no-default-features --features "serde"

      - name: Test (no-default + serde + runtime-tokio)
        run: cargo test -p sassi --no-default-features --features "serde,runtime-tokio"

      # Lihaaf is the authoritative compile-fixture gate for sassi.
      # Pinned to an exact alpha to keep the snapshot byte format and
      # CLI surface deterministic across runs; bumping the pin is a
      # conscious step that travels with any required `--bless`.
      - name: Install cargo-lihaaf (pinned alpha)
        run: cargo install lihaaf --version 0.1.0-alpha.3 --locked

      - name: Lihaaf compile-fixture suite (sassi-macros)
        run: cargo lihaaf --manifest-path sassi-macros/Cargo.toml

  wasm-target:
    name: WASM target build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry/git/target (wasm)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      # Builds sassi against `wasm32-unknown-unknown` to catch cfg-gated
      # runtime behavior regressions before packaging.
      - name: Build sassi for wasm32
        run: cargo build -p sassi --target wasm32-unknown-unknown

      # Runtime marker builds exercise explicit feature combinations.
      - name: Build sassi for wasm32 with explicit runtime-marker combo
        run: cargo build -p sassi --target wasm32-unknown-unknown --no-default-features --features "runtime-tokio,runtime-wasm"

      - name: Build sassi for wasm32 with serde/runtime-wasm runtime marker
        run: cargo build -p sassi --target wasm32-unknown-unknown --no-default-features --features "serde,runtime-wasm"

      # The `runtime-wasm` executor (spawn_local + gloo-timers sleep +
      # web_time monotonic clock) is exercised through wasm-bindgen
      # tests. `wasm-bindgen-test-runner` is invoked through the
      # `target.wasm32-unknown-unknown.runner` setting in
      # `.cargo/config.toml`, which keeps `cargo test --target
      # wasm32-unknown-unknown` as the canonical entry point on
      # contributor machines and CI alike. Node is the default
      # execution environment; the Sassi wasm test binary asserts on
      # structural outcomes (entry expired, sweep removed it, refresh
      # ran) rather than millisecond-precise schedules so the suite is
      # not sensitive to runtime jitter.
      - name: Install wasm-bindgen-cli (matched to crate version)
        run: |
          version=$(cargo metadata --format-version 1 \
            | python3 -c "import json,sys; m=json.load(sys.stdin); print(next(p['version'] for p in m['packages'] if p['name']=='wasm-bindgen'))")
          cargo install -f wasm-bindgen-cli --version "$version" --locked

      - name: Run sassi wasm-bindgen tests
        run: cargo test -p sassi --target wasm32-unknown-unknown --test punnu_executor_wasm --no-default-features --features "serde,runtime-wasm"

  msrv:
    name: MSRV (Rust 1.95)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install MSRV toolchain (matches workspace.package.rust-version)
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache cargo registry/git/target (MSRV)
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-msrv-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-msrv-

      - name: cargo check (default features)
        run: cargo check --workspace

  # Redis-backed integration tests for sassi-cache-redis. Kept as a
  # separate job so the dependency footprint (Redis service container)
  # doesn't slow down the default `check` job.
  redis:
    name: Redis backend
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-redis-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-redis-

      # Detect via `cargo metadata` instead of a path filter so this job
      # remains stable if the Redis companion crate is temporarily removed
      # or renamed during future release work.
      - name: Detect sassi-cache-redis presence
        id: redis-crate
        run: |
          if cargo metadata --no-deps --format-version 1 \
              | grep -q '"name":"sassi-cache-redis"'; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::sassi-cache-redis not yet in workspace; skipping redis job"
          fi

      - name: Test sassi-cache-redis
        if: steps.redis-crate.outputs.exists == 'true'
        run: cargo test -p sassi-cache-redis

  docs:
    name: cargo doc
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-docs-

      - name: cargo doc (warnings as errors)
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps --all-features
